name: Publish Homebrew

on:
  release:
    types: [published]

jobs:
  homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Download formula from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "awrust-cli.rb" \
            --dir .

      - name: Push formula to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/awrust/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp awrust-cli.rb tap/Formula/awrust-cli.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/awrust-cli.rb
          git commit -m "awrust-cli ${{ github.event.release.tag_name }}"
          git push
